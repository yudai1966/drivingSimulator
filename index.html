<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>2D リアルドライビングシミュレーター 主観カメラ</title>
    <style>
        body {
            margin: 0; padding: 0; overflow: hidden;
            background-color: #228B22; /* コース外は緑色 */
            touch-action: none; user-select: none;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        canvas {
            display: block; width: 100vw; height: 100vh;
        }
        /* オーバーレイUI (メニュー、リザルト) */
        .overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8);
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            color: white; z-index: 30;
        }
        .hidden { display: none !important; }
        h1, h2 { margin-bottom: 20px; text-shadow: 2px 2px 4px black; }
        .course-btn {
            padding: 15px 40px; margin: 10px; font-size: 1.2rem; font-weight: bold;
            background: linear-gradient(135deg, #FF6347, #FF4500);
            color: white; border: none; border-radius: 8px; cursor: pointer;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3); transition: transform 0.1s;
        }
        .course-btn:active { transform: scale(0.95); }
        .course-desc { font-size: 0.9rem; color: #ccc; margin-bottom: 10px; }
        
        /* ゲーム中HUD */
        #ui-layer {
            position: absolute; top: 10px; left: 10px;
            color: white; text-shadow: 1px 1px 2px black;
            pointer-events: none; z-index: 10;
        }
        #hud-layer {
            position: absolute; top: 10px; right: 20px;
            color: white; text-align: right; text-shadow: 1px 1px 2px black;
            font-size: 1.4rem; font-family: monospace; pointer-events: none; z-index: 10;
        }
        #flash-message {
            position: absolute; top: 30%; left: 50%; transform: translate(-50%, -50%);
            color: #FFD700; font-size: 3rem; font-weight: bold; font-style: italic;
            text-shadow: 2px 2px 5px black; opacity: 0; transition: opacity 0.3s, transform 0.3s;
            pointer-events: none; z-index: 20;
        }
        #result-details { margin: 20px 0; font-size: 1.2rem; font-family: monospace; text-align: left; }
    </style>
</head>
<body>
    <!-- メニュー画面 -->
    <div id="menu-layer" class="overlay">
        <h1>TIME ATTACK</h1>
        <p style="margin-bottom: 30px;">コースを選択してスタート（音声が出ます）</p>
        <button class="course-btn" onclick="startGame('oval')">オーバル</button>
        <div class="course-desc">高速な楕円コース (3 Laps)</div>
        <button class="course-btn" onclick="startGame('figure8')">8の字</button>
        <div class="course-desc">左右の荷重移動の練習に (2 Laps)</div>
        <button class="course-btn" onclick="startGame('technical')">テクニカル</button>
        <div class="course-desc">複合コーナーとヘアピン (2 Laps)</div>
    </div>

    <!-- リザルト画面 -->
    <div id="result-layer" class="overlay hidden">
        <h2 style="font-size: 3rem; color: #FFD700;">GOAL!</h2>
        <div id="result-details"></div>
        <button class="course-btn" onclick="backToMenu()">メニューへ戻る</button>
    </div>

    <!-- ゲーム中UI -->
    <div id="ui-layer" class="hidden">
        <div style="font-size: 1.2rem;">速度: <span id="speed-disp">0</span> km/h</div>
        <div style="font-size: 0.8rem; margin-top: 5px; color: #ddd;">
            【操作】下部の丸を指でスライド<br>
            ・左右：ハンドル<br>・上：アクセル / 下：ブレーキ
        </div>
    </div>
    <div id="hud-layer" class="hidden">
        <div id="hud-lap">LAP: 1 / 3</div>
        <div id="hud-time">TIME: 00:00.000</div>
    </div>
    <div id="flash-message"></div>

    <canvas id="gameCanvas"></canvas>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    
    function resize() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
    }
    window.addEventListener('resize', resize);
    resize();

    // ==========================================
    // レース管理システム
    // ==========================================
    let raceState = 'MENU';
    let currentCourse = null;
    let currentLap = 0;
    let nextGateIndex = 0;
    let currentLapStartTime = 0;
    let lapTimes = [];
    let prevCarPos = {x: 0, y: 0};
    const SCALE = 12; // 1メートル = 12ピクセル

    function formatTime(ms) {
        if (!ms || ms < 0) return "00:00.000";
        let d = new Date(ms);
        let m = d.getUTCMinutes().toString().padStart(2, '0');
        let s = d.getUTCSeconds().toString().padStart(2, '0');
        let ml = d.getUTCMilliseconds().toString().padStart(3, '0');
        return `${m}:${s}.${ml}`;
    }

    function showFlashMessage(text) {
        let el = document.getElementById('flash-message');
        el.innerText = text;
        el.style.opacity = 1;
        el.style.transform = "translate(-50%, -50%) scale(1.2)";
        setTimeout(() => {
            el.style.opacity = 0;
            el.style.transform = "translate(-50%, -50%) scale(1.0)";
        }, 1200);
    }

    function createGate(x, y, width, yaw) {
        let detectionWidth = Math.max(width, 100); 
        let dx = Math.cos(yaw + Math.PI/2) * (detectionWidth/2);
        let dy = Math.sin(yaw + Math.PI/2) * (detectionWidth/2);
        return {
            cx: x, cy: y,
            p1: { x: x - dx, y: y - dy },
            p2: { x: x + dx, y: y + dy },
            dir: { x: Math.cos(yaw), y: Math.sin(yaw) }
        };
    }

    // ==========================================
    // コース描画ヘルパー
    // ==========================================
    function drawTrackWithCurbs(ctx, width, curbPaths, roadPaths) {
        const curbWidth = 1.5 * SCALE; 
        const originalLineCap = ctx.lineCap; // 外側の設定（roundなど）を保存
        
        if (curbPaths && curbPaths.length > 0) {
            // ★修正: 縁石の描画時は端を平坦にして、破線同士が重なって白ベタになるのを防ぐ
            ctx.lineCap = 'butt'; 
            
            ctx.lineWidth = width + curbWidth * 2;
            ctx.strokeStyle = '#D32F2F'; 
            curbPaths.forEach(fn => {
                ctx.beginPath(); fn(ctx); ctx.stroke();
            });

            ctx.strokeStyle = '#FFFFFF';
            // ★修正: ダッシュの長さを少し長め（4m）にして視認性を向上
            ctx.setLineDash([4 * SCALE, 4 * SCALE]); 
            curbPaths.forEach(fn => {
                ctx.beginPath(); fn(ctx); ctx.stroke();
            });
            ctx.setLineDash([]);
        }

        // コース本体の描画（元の端の丸め設定に戻す）
        ctx.lineCap = originalLineCap;
        ctx.lineWidth = width;
        ctx.strokeStyle = '#808080';
        roadPaths.forEach(fn => {
            ctx.beginPath(); fn(ctx); ctx.stroke();
        });
    }

    function drawStartLine(ctx, x, y, width, yaw=0) {
        ctx.save();
        ctx.translate(x * SCALE, y * SCALE);
        ctx.rotate(yaw);

        ctx.beginPath();
        ctx.rect(-1.5 * SCALE, -width/2 * SCALE, 3 * SCALE, width * SCALE);
        ctx.clip(); 

        ctx.fillStyle = '#FFFFFF';
        ctx.fillRect(-1.5 * SCALE, -width/2 * SCALE, 3 * SCALE, width * SCALE);
        
        ctx.fillStyle = '#000000';
        for(let i = -Math.floor(width/2) - 3; i <= Math.ceil(width/2) + 3; i += 1.5) {
            if(Math.abs(Math.round(i / 1.5) % 2) === 1) {
                ctx.fillRect(-1.5 * SCALE, i * SCALE, 1.5 * SCALE, 1.5 * SCALE);
                ctx.fillRect(0, (i+1.5) * SCALE, 1.5 * SCALE, 1.5 * SCALE);
            }
        }
        ctx.restore();
    }

    // ==========================================
    // コースデータ
    // ==========================================
    const courses = {
        oval: {
            name: 'オーバル', laps: 3,
            startState: [-5, -30, 0, 0, 0, 0], 
            draw: (ctx) => {
                ctx.lineCap = 'butt';
                ctx.lineJoin = 'round';
                
                const curbPaths = [
                    (c) => {
                        c.moveTo(-30 * SCALE, 30 * SCALE);
                        c.lineTo(-50 * SCALE, 30 * SCALE);
                        c.arc(-50 * SCALE, 0, 30 * SCALE, Math.PI/2, Math.PI*1.5);
                        c.lineTo(-30 * SCALE, -30 * SCALE);
                    },
                    (c) => {
                        c.moveTo(30 * SCALE, -30 * SCALE);
                        c.lineTo(50 * SCALE, -30 * SCALE);
                        c.arc(50 * SCALE, 0, 30 * SCALE, -Math.PI/2, Math.PI/2);
                        c.lineTo(30 * SCALE, 30 * SCALE);
                    }
                ];
                const roadPaths = [
                    (c) => {
                        c.arc(-50 * SCALE, 0, 30 * SCALE, Math.PI/2, Math.PI*1.5);
                        c.lineTo(50 * SCALE, -30 * SCALE);
                        c.arc(50 * SCALE, 0, 30 * SCALE, -Math.PI/2, Math.PI/2);
                        c.closePath();
                    }
                ];
                drawTrackWithCurbs(ctx, 12 * SCALE, curbPaths, roadPaths);
                drawStartLine(ctx, 0, -30, 12, 0);
            },
            gates: [
                createGate(0, -30, 16, 0),
                createGate(50, -30, 20, 0),
                createGate(80, 0, 20, Math.PI/2),
                createGate(50, 30, 20, Math.PI),
                createGate(0, 30, 20, Math.PI),
                createGate(-50, 30, 20, Math.PI),
                createGate(-80, 0, 20, -Math.PI/2),
                createGate(-50, -30, 20, 0)
            ]
        },
        figure8: {
            name: '8の字', laps: 2,
            startState: [-38, 33, 0, 0, 0, 0],
            draw: (ctx) => {
                ctx.lineCap = 'butt';
                
                const curbPaths = [
                    (c) => { c.arc(-33 * SCALE, 0, 33 * SCALE, Math.PI/4, Math.PI * 1.75); },
                    (c) => { c.arc(33 * SCALE, 0, 33 * SCALE, -Math.PI*0.75, Math.PI * 0.75); }
                ];
                const roadPaths = [
                    (c) => { c.arc(-33 * SCALE, 0, 33 * SCALE, 0, Math.PI * 2); },
                    (c) => { c.arc(33 * SCALE, 0, 33 * SCALE, 0, Math.PI * 2); }
                ];
                drawTrackWithCurbs(ctx, 10 * SCALE, curbPaths, roadPaths);
                drawStartLine(ctx, -33, 33, 10, 0);
            },
            gates: [
                createGate(-33, 33, 20, 0),
                createGate(0, 0, 25, -Math.PI/4),
                createGate(33, -33, 20, 0),
                createGate(66, 0, 20, Math.PI/2),
                createGate(33, 33, 20, Math.PI),
                createGate(0, 0, 25, -Math.PI*3/4),
                createGate(-33, -33, 20, Math.PI),
                createGate(-66, 0, 20, Math.PI/2)
            ]
        },
        technical: {
            name: 'テクニカル', laps: 2,
            startState: [5, 40, Math.PI, 0, 0, 0],
            draw: (ctx) => {
                ctx.lineJoin = 'round'; 
                // コース本体を滑らかにつなぐための設定
                ctx.lineCap = 'round'; 
                
                const curbPaths = [
                    (c) => { // 左ヘアピン
                        c.moveTo(-20 * SCALE, 40 * SCALE);
                        c.lineTo(-40 * SCALE, 40 * SCALE);
                        c.arc(-40 * SCALE, 20 * SCALE, 20 * SCALE, Math.PI/2, Math.PI*1.5);
                        c.lineTo(-40 * SCALE, -10 * SCALE);
                    },
                    (c) => { // クランク
                        c.moveTo(-35 * SCALE, -20 * SCALE);
                        c.lineTo(-20 * SCALE, -20 * SCALE); 
                        c.lineTo(-20 * SCALE, -40 * SCALE);
                        c.lineTo(-5 * SCALE, -40 * SCALE);
                    },
                    (c) => { // 右ヘアピン〜S字
                        c.moveTo(25 * SCALE, -40 * SCALE);
                        c.lineTo(40 * SCALE, -40 * SCALE);
                        c.arc(40 * SCALE, -20 * SCALE, 20 * SCALE, -Math.PI/2, Math.PI/2);
                        c.bezierCurveTo(0, 0, 40 * SCALE, 40 * SCALE, 20 * SCALE, 40 * SCALE);
                        c.lineTo(10 * SCALE, 40 * SCALE);
                    }
                ];
                const roadPaths = [
                    (c) => {
                        c.moveTo(20 * SCALE, 40 * SCALE);
                        c.lineTo(-40 * SCALE, 40 * SCALE);
                        c.arc(-40 * SCALE, 20 * SCALE, 20 * SCALE, Math.PI/2, Math.PI*1.5);
                        c.lineTo(-40 * SCALE, -20 * SCALE);
                        c.lineTo(-20 * SCALE, -20 * SCALE); 
                        c.lineTo(-20 * SCALE, -40 * SCALE);
                        c.lineTo(40 * SCALE, -40 * SCALE);
                        c.arc(40 * SCALE, -20 * SCALE, 20 * SCALE, -Math.PI/2, Math.PI/2);
                        c.bezierCurveTo(0, 0, 40 * SCALE, 40 * SCALE, 20 * SCALE, 40 * SCALE);
                    }
                ];
                drawTrackWithCurbs(ctx, 10 * SCALE, curbPaths, roadPaths);
                drawStartLine(ctx, 0, 40, 10, Math.PI);
            },
            gates: [
                createGate(0, 40, 20, Math.PI),
                createGate(-40, 40, 20, Math.PI),
                createGate(-60, 20, 20, -Math.PI/2),
                createGate(-40, 0, 20, 0),
                createGate(-40, -20, 20, -Math.PI/2),
                createGate(-20, -20, 20, 0),
                createGate(-20, -40, 20, -Math.PI/2),
                createGate(10, -40, 20, 0),
                createGate(40, -40, 20, 0),
                createGate(60, -20, 20, Math.PI/2),
                createGate(40, 0, 20, Math.PI),
                createGate(20, 20, 25, Math.PI/2),
                createGate(20, 40, 20, Math.PI)
            ]
        }
    };

    // ==========================================
    // オーディオ設定
    // ==========================================
    let audioCtx = null, engineOsc = null, engineGain = null, brakeNoise = null, brakeGain = null;
    let isAudioInitialized = false;

    function initAudio() {
        if (isAudioInitialized) return;
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        
        engineOsc = audioCtx.createOscillator(); engineOsc.type = 'sawtooth';
        engineGain = audioCtx.createGain();
        let engineFilter = audioCtx.createBiquadFilter();
        engineFilter.type = 'lowpass'; engineFilter.frequency.value = 600;
        
        engineOsc.connect(engineFilter); engineFilter.connect(engineGain); engineGain.connect(audioCtx.destination);
        engineOsc.start(); engineGain.gain.value = 0;

        const bufferSize = audioCtx.sampleRate * 2;
        const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
        const data = buffer.getChannelData(0);
        for (let i = 0; i < bufferSize; i++) data[i] = Math.random() * 2 - 1;
        
        brakeNoise = audioCtx.createBufferSource(); brakeNoise.buffer = buffer; brakeNoise.loop = true;
        let brakeFilter = audioCtx.createBiquadFilter();
        brakeFilter.type = 'bandpass'; brakeFilter.frequency.value = 2500; brakeFilter.Q.value = 1.0;
        brakeGain = audioCtx.createGain();
        
        brakeNoise.connect(brakeFilter); brakeFilter.connect(brakeGain); brakeGain.connect(audioCtx.destination);
        brakeNoise.start(); brakeGain.gain.value = 0;

        isAudioInitialized = true;
    }

    function updateAudio(speed, accel, brake) {
        if (!isAudioInitialized || !audioCtx) return;
        let targetFreq = 50 + speed * 3 + accel * 80;
        engineOsc.frequency.setTargetAtTime(targetFreq, audioCtx.currentTime, 0.1);
        let targetGain = (raceState === 'RACING') ? (0.05 + accel * 0.1) : 0.02;
        engineGain.gain.setTargetAtTime(targetGain, audioCtx.currentTime, 0.1);

        let targetBrakeGain = (brake > 0.1 && speed > 2.0) ? brake * 0.3 : 0;
        brakeGain.gain.setTargetAtTime(targetBrakeGain, audioCtx.currentTime, 0.05);
    }

    // ==========================================
    // 入力処理
    // ==========================================
    let inputSteer = 0, inputAccel = 0, inputBrake = 0;
    let touchControl = { active: false, id: null, startX: 0, startY: 0, currentX: 0, currentY: 0 };
    const UI_RADIUS = 100;

    function getUICenter() { return { x: canvas.width / 2, y: canvas.height - 150 }; }

    function updateInputs() {
        if (raceState !== 'RACING') {
            inputSteer = 0; inputAccel = 0; inputBrake = 0.8;
            return;
        }
        if (!touchControl.active) {
            inputSteer = 0; inputAccel = 0; inputBrake = 0;
            return;
        }

        let diffX = touchControl.currentX - touchControl.startX;
        let diffY = touchControl.currentY - touchControl.startY;
        inputSteer = Math.max(-1, Math.min(1, diffX / UI_RADIUS));
        let valY = Math.max(-1, Math.min(1, diffY / UI_RADIUS));
        if (valY < 0) { inputAccel = -valY; inputBrake = 0; }
        else { inputAccel = 0; inputBrake = valY; }
    }

    function handlePointerDown(e) {
        if (raceState !== 'RACING') return;
        if (!touchControl.active) {
            const center = getUICenter();
            let dx = e.clientX - center.x; let dy = e.clientY - center.y;
            if (dx*dx + dy*dy <= UI_RADIUS * UI_RADIUS * 2.0) {
                touchControl.active = true; touchControl.id = e.pointerId;
                touchControl.startX = center.x; touchControl.startY = center.y;
                touchControl.currentX = e.clientX; touchControl.currentY = e.clientY;
                updateInputs();
            }
        }
    }
    function handlePointerMove(e) {
        if (touchControl.active && e.pointerId === touchControl.id) {
            touchControl.currentX = e.clientX; touchControl.currentY = e.clientY;
            updateInputs();
        }
    }
    function handlePointerUp(e) {
        if (touchControl.active && e.pointerId === touchControl.id) {
            touchControl.active = false;
        }
    }
    canvas.addEventListener('pointerdown', handlePointerDown);
    canvas.addEventListener('pointermove', handlePointerMove);
    window.addEventListener('pointerup', handlePointerUp);
    window.addEventListener('pointercancel', handlePointerUp);

    // ==========================================
    // 物理シミュレーション (車両モデル)
    // ==========================================
    const mass = 1350, Iz = 1900, lf = 1.1, lr = 1.5, L = lf + lr, T = 1.53, h = 0.5, mu = 1.0;
    const C_alpha_f = 60000, C_alpha_r = 85000, g = 9.81;
    let state = [0, 0, 0, 0.1, 0, 0];
    let prev_ax = 0, prev_ay = 0, loads = [0, 0, 0, 0];

    function getDerivatives(S, steerInput, accelInput, brakeInput, current_ax, current_ay) {
        let [x, y, yaw, u, v, r] = S;
        let u_safe = Math.max(Math.abs(u), 0.5) * Math.sign(u);
        if (Math.abs(u) < 0.1) u_safe = 0.1;

        let Fz_static_f = mass * g * lr / L / 2, Fz_static_r = mass * g * lf / L / 2;
        let dFz_pitch = mass * current_ax * h / L / 2;
        let dFz_roll_f = mass * current_ay * h / T * 0.6, dFz_roll_r = mass * current_ay * h / T * 0.4;
        let Fz_fl = Math.max(0.1, Fz_static_f - dFz_pitch + dFz_roll_f);
        let Fz_fr = Math.max(0.1, Fz_static_f - dFz_pitch - dFz_roll_f);
        let Fz_rl = Math.max(0.1, Fz_static_r + dFz_pitch + dFz_roll_r);
        let Fz_rr = Math.max(0.1, Fz_static_r + dFz_pitch - dFz_roll_r);
        loads = [Fz_fl, Fz_fr, Fz_rl, Fz_rr];

        let delta = steerInput * (Math.PI / 5);
        let alpha_fl = delta - Math.atan2(v + lf * r, u_safe - T/2 * r);
        let alpha_fr = delta - Math.atan2(v + lf * r, u_safe + T/2 * r);
        let alpha_rl =       - Math.atan2(v - lr * r, u_safe - T/2 * r);
        let alpha_rr =       - Math.atan2(v - lr * r, u_safe + T/2 * r);

        let engineForce = accelInput * 4500, brakeForce = brakeInput * 11000; 
        let Fx_fl = engineForce * 0.5 - brakeForce * 0.35 * Math.sign(u);
        let Fx_fr = engineForce * 0.5 - brakeForce * 0.35 * Math.sign(u);
        let Fx_rl = - brakeForce * 0.15 * Math.sign(u);
        let Fx_rr = - brakeForce * 0.15 * Math.sign(u);
        let drag = -0.5 * u * Math.abs(u) - 25 * u;
        Fx_rl += drag/2; Fx_rr += drag/2;

        function getTireForceY(alpha, Fz, Fx, C_alpha_param) {
            let max_F = mu * Fz;
            let available_Fy = Math.sqrt(Math.max(0, max_F**2 - Fx**2));
            let Fy = C_alpha_param * alpha * (Fz / (mass * g / 4));
            if (Math.abs(u) < 2.0) Fy *= Math.abs(u) / 2.0;
            return Math.max(-available_Fy, Math.min(available_Fy, Fy));
        }

        let Fy_fl = getTireForceY(alpha_fl, Fz_fl, Fx_fl, C_alpha_f);
        let Fy_fr = getTireForceY(alpha_fr, Fz_fr, Fx_fr, C_alpha_f);
        let Fy_rl = getTireForceY(alpha_rl, Fz_rl, Fx_rl, C_alpha_r);
        let Fy_rr = getTireForceY(alpha_rr, Fz_rr, Fx_rr, C_alpha_r);

        let sumFx = Fx_fl * Math.cos(delta) - Fy_fl * Math.sin(delta) + Fx_fr * Math.cos(delta) - Fy_fr * Math.sin(delta) + Fx_rl + Fx_rr;
        let sumFy = Fx_fl * Math.sin(delta) + Fy_fl * Math.cos(delta) + Fx_fr * Math.sin(delta) + Fy_fr * Math.cos(delta) + Fy_rl + Fy_rr;
        let sumMz = lf * ( (Fx_fl * Math.sin(delta) + Fy_fl * Math.cos(delta)) + (Fx_fr * Math.sin(delta) + Fy_fr * Math.cos(delta)) )
                  - lr * (Fy_rl + Fy_rr)
                  + (T/2) * ( -(Fx_fl * Math.cos(delta) - Fy_fl * Math.sin(delta)) + (Fx_fr * Math.cos(delta) - Fy_fr * Math.sin(delta)) - Fx_rl + Fx_rr );

        let du = sumFx / mass + v * r, dv = sumFy / mass - u * r, dr = sumMz / Iz;
        let dx = u * Math.cos(yaw) - v * Math.sin(yaw), dy = u * Math.sin(yaw) + v * Math.cos(yaw), dyaw = r;

        if (Math.abs(u) < 1.0 && accelInput === 0 && brakeInput === 0) { dv -= v * 10; dr -= r * 10; du -= u * 2; }
        return [dx, dy, dyaw, du, dv, dr];
    }

    function stepRK4(dt) {
        let derivs = getDerivatives(state, inputSteer, inputAccel, inputBrake, prev_ax, prev_ay);
        prev_ax = derivs[3] - state[4] * state[5]; prev_ay = derivs[4] + state[3] * state[5];

        let k1 = getDerivatives(state, inputSteer, inputAccel, inputBrake, prev_ax, prev_ay);
        let state_k2 = state.map((val, i) => val + k1[i] * dt * 0.5);
        let k2 = getDerivatives(state_k2, inputSteer, inputAccel, inputBrake, prev_ax, prev_ay);
        let state_k3 = state.map((val, i) => val + k2[i] * dt * 0.5);
        let k3 = getDerivatives(state_k3, inputSteer, inputAccel, inputBrake, prev_ax, prev_ay);
        let state_k4 = state.map((val, i) => val + k3[i] * dt);
        let k4 = getDerivatives(state_k4, inputSteer, inputAccel, inputBrake, prev_ax, prev_ay);

        for (let i = 0; i < state.length; i++) state[i] += (k1[i] + 2*k2[i] + 2*k3[i] + k4[i]) * dt / 6;
    }

    // ==========================================
    // レース判定ロジック
    // ==========================================
    function isIntersecting(p1, p2, p3, p4) {
        let den = ((p2.x - p1.x) * (p4.y - p3.y)) - ((p2.y - p1.y) * (p4.x - p3.x));
        if (den === 0) return false;
        let a = ((p4.x - p3.x) * (p1.y - p3.y) - (p4.y - p3.y) * (p1.x - p3.x)) / den;
        let b = ((p2.x - p1.x) * (p1.y - p3.y) - (p2.y - p1.y) * (p1.x - p3.x)) / den;
        return (a > 0 && a < 1) && (b > 0 && b < 1);
    }

    function checkGates(prev, curr) {
        if (!currentCourse) return;
        let gate = currentCourse.gates[nextGateIndex];
        
        if (isIntersecting(prev, curr, gate.p1, gate.p2)) {
            let moveVec = {x: curr.x - prev.x, y: curr.y - prev.y};
            if (moveVec.x * gate.dir.x + moveVec.y * gate.dir.y > 0) {
                if (nextGateIndex === 0) {
                    let now = performance.now();
                    if (currentLap === 0) {
                        currentLap = 1; currentLapStartTime = now;
                        showFlashMessage("START!");
                    } else {
                        lapTimes.push(now - currentLapStartTime);
                        currentLapStartTime = now; currentLap++;
                        if (currentLap > currentCourse.laps) {
                            showResult(); return;
                        } else {
                            showFlashMessage(`LAP ${currentLap}`);
                        }
                    }
                }
                nextGateIndex = (nextGateIndex + 1) % currentCourse.gates.length;
            }
        }
    }

    // ==========================================
    // 描画処理
    // ==========================================
    let carDisplayX = 0, carDisplayY = 0;

    function drawCarFixed() {
        const carW = 1.8 * SCALE, carL = 4.3 * SCALE, tireW = 0.4 * SCALE, tireL = 0.8 * SCALE;
        ctx.fillStyle = '#F5F5F5'; ctx.fillRect(-lr * SCALE, -carW/2, carL, carW);
        ctx.fillStyle = '#222222'; ctx.fillRect(0.3 * SCALE, -carW/2 + 2, 0.8 * SCALE, carW - 4);
        ctx.strokeStyle = '#CCCCCC'; ctx.lineWidth = 1; ctx.strokeRect(-lr * SCALE, -carW/2, carL, carW);

        const drawTire = (oX, oY, stA, load) => {
            ctx.save(); ctx.translate(oX * SCALE, oY * SCALE); ctx.rotate(stA);
            let alpha = Math.max(0.2, Math.min(1.0, (load / (mass * g / 4)) * 0.8));
            ctx.fillStyle = `rgba(20, 20, 20, ${alpha})`;
            ctx.fillRect(-tireL/2, -tireW/2, tireL, tireW);
            ctx.strokeStyle = '#000'; ctx.strokeRect(-tireL/2, -tireW/2, tireL, tireW);
            ctx.restore();
        };
        let delta = inputSteer * (Math.PI / 5);
        drawTire(lf, -T/2, delta, loads[0]); drawTire(lf, T/2, delta, loads[1]);
        drawTire(-lr, -T/2, 0, loads[2]); drawTire(-lr, T/2, 0, loads[3]);
    }

    function drawNavigationArrow() {
        if (raceState !== 'RACING' || !currentCourse) return;
        
        let gate = currentCourse.gates[nextGateIndex];
        let dx = gate.cx - state[0];
        let dy = gate.cy - state[1];
        let dist = Math.hypot(dx, dy);

        if (dist < 30) {
            let nextTargetIndex = (nextGateIndex + 1) % currentCourse.gates.length;
            let nextGate = currentCourse.gates[nextTargetIndex];
            dx = nextGate.cx - state[0];
            dy = nextGate.cy - state[1];
        }
        
        let relAngle = Math.atan2(dy, dx) - state[2];
        
        ctx.save();
        ctx.setTransform(1, 0, 0, 1, 0, 0);
        ctx.translate(carDisplayX, carDisplayY);
        ctx.rotate(relAngle);
        ctx.translate(0, -120);
        
        ctx.fillStyle = `rgba(255, 215, 0, 0.8)`;
        ctx.beginPath(); 
        ctx.moveTo(0, -15);
        ctx.lineTo(12, 12); 
        ctx.lineTo(-12, 12); 
        ctx.closePath();
        ctx.fill();
        ctx.strokeStyle = `rgba(0,0,0,0.5)`; ctx.lineWidth=2; ctx.stroke();
        ctx.restore();
    }

    function drawUI() {
        ctx.save(); ctx.setTransform(1, 0, 0, 1, 0, 0);
        const center = getUICenter();
        ctx.fillStyle = 'rgba(0, 0, 0, 0.3)'; ctx.beginPath(); ctx.arc(center.x, center.y, UI_RADIUS, 0, Math.PI*2); ctx.fill();
        ctx.strokeStyle = 'rgba(255, 255, 255, 0.5)'; ctx.lineWidth = 2; ctx.stroke();
        
        let posX = center.x + inputSteer * UI_RADIUS, posY = center.y;
        if (inputAccel > 0) posY -= inputAccel * UI_RADIUS;
        if (inputBrake > 0) posY += inputBrake * UI_RADIUS;
        
        if (inputAccel > 0) ctx.fillStyle = 'rgba(100, 255, 100, 0.9)';
        else if (inputBrake > 0) ctx.fillStyle = 'rgba(255, 100, 100, 0.9)';
        else ctx.fillStyle = 'rgba(255, 255, 255, 0.9)';
        ctx.beginPath(); ctx.arc(posX, posY, 25, 0, Math.PI*2); ctx.fill();
        ctx.restore();
    }

    function updateHUD() {
        document.getElementById('speed-disp').innerText = Math.abs(Math.round(state[3] * 3.6));
        if (raceState === 'RACING') {
            document.getElementById('hud-lap').innerText = currentLap === 0 ? "OUT LAP" : `LAP: ${currentLap} / ${currentCourse.laps}`;
            document.getElementById('hud-time').innerText = currentLap > 0 ? `TIME: ${formatTime(performance.now() - currentLapStartTime)}` : "TIME: 00:00.000";
        }
    }

    // ==========================================
    // ゲームフロー制御
    // ==========================================
    window.startGame = function(courseId) {
        if (!isAudioInitialized) initAudio();
        else if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume();
        
        currentCourse = courses[courseId];
        state = [...currentCourse.startState];
        prev_ax = 0; prev_ay = 0;
        inputSteer = 0; inputAccel = 0; inputBrake = 0; touchControl.active = false;
        
        currentLap = 0; nextGateIndex = 0; lapTimes = [];
        
        document.getElementById('menu-layer').classList.add('hidden');
        document.getElementById('result-layer').classList.add('hidden');
        document.getElementById('ui-layer').classList.remove('hidden');
        document.getElementById('hud-layer').classList.remove('hidden');
        
        raceState = 'RACING';
        showFlashMessage("GET READY!");
    }

    window.showResult = function() {
        raceState = 'FINISHED';
        document.getElementById('ui-layer').classList.add('hidden');
        document.getElementById('hud-layer').classList.add('hidden');
        
        let html = ""; let total = 0;
        lapTimes.forEach((t, i) => { html += `<div>Lap ${i+1} : ${formatTime(t)}</div>`; total += t; });
        html += `<div style="margin-top:15px; color:#FFD700;">Total : ${formatTime(total)}</div>`;
        document.getElementById('result-details').innerHTML = html;
        
        setTimeout(() => document.getElementById('result-layer').classList.remove('hidden'), 1500);
    }

    window.backToMenu = function() {
        raceState = 'MENU'; currentCourse = null;
        document.getElementById('result-layer').classList.add('hidden');
        document.getElementById('menu-layer').classList.remove('hidden');
    }

    // ==========================================
    // メインループ
    // ==========================================
    function loop() {
        if (raceState === 'RACING' || raceState === 'FINISHED') {
            updateInputs();
            prevCarPos = {x: state[0], y: state[1]};
            stepRK4(1/60); // 固定dt
            if (raceState === 'RACING') checkGates(prevCarPos, {x: state[0], y: state[1]});
            updateAudio(Math.abs(state[3]), inputAccel, inputBrake);
        }
        
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        
        carDisplayX = canvas.width / 2; 
        carDisplayY = canvas.height * 0.7;
        
        if (currentCourse) {
            ctx.save();
            ctx.translate(carDisplayX, carDisplayY);
            ctx.rotate(-state[2] - Math.PI / 2);
            ctx.translate(-state[0] * SCALE, -state[1] * SCALE);
            currentCourse.draw(ctx);
            ctx.restore();
            
            ctx.save(); 
            ctx.translate(carDisplayX, carDisplayY); 
            ctx.rotate(-Math.PI / 2);
            drawCarFixed();
            ctx.restore();
            
            drawNavigationArrow();
            updateHUD();
            if (raceState === 'RACING' || raceState === 'FINISHED') drawUI();
        }
        requestAnimationFrame(loop);
    }
    
    // 初期起動
    requestAnimationFrame(loop);
</script>
</body>
